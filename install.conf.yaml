- defaults:
    link:
      create: true
      relink: true

- clean: ["~"]

- link:
    ~/.gitconfig: gitconfig
    ~/.zprofile: zprofile
    ~/.zshrc: zsh/zshrc
    ~/.zsh_plugins.txt: zsh/zsh_plugins.txt
    ~/.p10k.zsh: zsh/p10k
    ~/.config/kitty:
      glob: true
      path: kitty/**
    ~/.config/nvim/lua/plugins:
      glob: true
      path: nvim/plugins/**
    ~/.config/nvim/lazyvim.json: nvim/lazyvim.json
    ~/.agents/skills/next-achitecture:
      glob: true,
      path: ai/skills/next-achitecture/**
    ~/.agents/skills/react-component-pattern:
      glob: true,
      path: ai/skills/react-component-pattern/**
    ~/.agents/skills/react-achitecture:
      glob: true,
      path: ai/skills/react-achitecture/**
